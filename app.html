<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>QR張り紙＆zaico登録</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
<style>
:root {
  --blue:   #1565ff;
  --orange: #f97316;
  --green:  #16a34a;
  --red:    #dc2626;
  --bg:     #eef1f7;
  --card:   #ffffff;
  --border: #b8c0d8;
  --text:   #111827;
  --sub:    #6b7280;
  --ph:     #a0aabf;
}
*, *::before, *::after {
  box-sizing: border-box; margin: 0; padding: 0;
  -webkit-tap-highlight-color: transparent;
  font-family: -apple-system, 'Hiragino Sans', 'Yu Gothic UI', sans-serif;
}
html, body { height: 100%; background: var(--bg); color: var(--text); }
#app { display: flex; flex-direction: column; height: 100%; }

/* ヘッダー */
.hd {
  background: var(--card); border-bottom: 2px solid var(--border);
  padding: 16px 20px;
  display: flex; align-items: center; justify-content: space-between;
  flex-shrink: 0;
}
.hd-title { font-size: 20px; font-weight: 800; }
.dot { width: 14px; height: 14px; border-radius: 50%; background: #f59e0b; transition: background .3s; }
.dot.ok  { background: var(--green); box-shadow: 0 0 0 4px #bbf7d0; }
.dot.err { background: var(--red);   box-shadow: 0 0 0 4px #fecaca; }

/* タブ */
.tab-bar {
  display: flex; background: var(--card);
  border-bottom: 2px solid var(--border); flex-shrink: 0;
}
.tab-btn {
  flex: 1; padding: 12px 8px;
  border: none; background: transparent;
  font-size: 13px; font-weight: 800; color: var(--sub);
  cursor: pointer; border-bottom: 3px solid transparent;
}
.tab-btn.active { color: var(--blue); border-bottom-color: var(--blue); }

/* タブコンテンツ */
.tab-pane { display: none; flex: 1; flex-direction: column; overflow: hidden; }
.tab-pane.active { display: flex; }

/* スクロール */
.scroll { flex: 1; overflow-y: auto; padding: 16px; -webkit-overflow-scrolling: touch; }

.lbl {
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .1em;
  margin-bottom: 8px; padding-left: 2px;
}

/* 製品コードカード */
.prod-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border);
  padding: 18px 20px 16px; margin-bottom: 16px;
}
.prod-hint { font-size: 12px; font-weight: 700; color: var(--sub); margin-bottom: 8px; }
#codeInput {
  display: block; width: 100%; border: none; outline: none;
  font-size: 40px; font-weight: 900; color: var(--text); background: transparent;
  letter-spacing: .04em; line-height: 1.2;
}
#codeInput::placeholder { color: #c8d0e0; font-weight: 400; font-size: 32px; }
.divider { height: 2px; background: var(--border); margin: 14px 0; }
#pName {
  display: block; width: 100%; border: none; outline: none;
  font-size: 22px; font-weight: 800; color: var(--blue);
  min-height: 32px; line-height: 1.3; background: transparent;
}
#pName::placeholder { color: #c8d0e0; font-weight: 400; }
.prod-iri { font-size: 15px; color: var(--sub); font-weight: 600; margin-top: 4px; min-height: 22px; }

/* 入力カード */
.input-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.input-row {
  display: flex; align-items: center;
  border-bottom: 2px solid var(--border); min-height: 72px;
}
.input-row:last-child { border-bottom: none; }
.input-row:focus-within { background: #f0f4ff; }
.input-label {
  width: 80px; flex-shrink: 0;
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .06em;
  text-align: center; padding: 0 8px;
  border-right: 2px solid var(--border);
  align-self: stretch;
  display: flex; align-items: center; justify-content: center;
  background: #f5f7fc;
}
.big-inp {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 28px; font-weight: 800; color: var(--text);
  padding: 16px 20px; width: 100%;
}
.big-inp::placeholder { color: var(--ph); font-size: 22px; font-weight: 400; }
.big-inp[type=number] { -moz-appearance: textfield; }
.big-inp[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }

/* 印刷バー */
.pbar {
  flex-shrink: 0; background: var(--card);
  border-top: 2px solid var(--border);
  padding: 12px 14px;
  padding-bottom: calc(12px + env(safe-area-inset-bottom));
  display: flex; align-items: center; gap: 8px;
  box-shadow: 0 -6px 30px rgba(0,0,0,.08);
}
.clr-btn {
  width: 60px; height: 64px;
  border: 2px solid var(--border); border-radius: 14px;
  background: var(--bg); color: var(--sub);
  font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.clr-btn:active { background: #fdecea; border-color: var(--red); color: var(--red); }
.cnt {
  display: flex; align-items: center;
  border: 2px solid var(--border); border-radius: 14px;
  overflow: hidden; background: var(--bg); flex-shrink: 0;
}
.cnt-btn {
  width: 40px; height: 64px; border: none; background: transparent;
  font-size: 24px; color: var(--sub); cursor: pointer;
  display: flex; align-items: center; justify-content: center;
}
.cnt-btn:active { background: var(--border); }
.cnt-val {
  width: 34px; text-align: center;
  font-size: 20px; font-weight: 900; color: var(--text);
  border: none; background: transparent; outline: none;
  -moz-appearance: textfield;
}
.cnt-val::-webkit-inner-spin-button { -webkit-appearance: none; }
.cnt-unit { font-size: 11px; font-weight: 800; color: var(--sub); padding-right: 8px; }
.pbtn {
  flex: 1; height: 64px; border: none; border-radius: 14px;
  background: var(--blue); color: #fff;
  font-size: 17px; font-weight: 900; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 4px 20px rgba(21,101,255,.3);
  transition: background .15s, transform .1s;
}
.pbtn:active:not(:disabled) { transform: scale(.96); background: #0f4fd6; }
.pbtn:disabled { background: #c8d0e0; color: var(--sub); box-shadow: none; cursor: not-allowed; }
.zbtn {
  flex: 1; height: 64px; border: none; border-radius: 14px;
  background: var(--orange); color: #fff;
  font-size: 17px; font-weight: 900; cursor: pointer;
  display: flex; align-items: center; justify-content: center; gap: 6px;
  box-shadow: 0 4px 20px rgba(249,115,22,.3);
  transition: background .15s, transform .1s;
}
.zbtn:active:not(:disabled) { transform: scale(.96); background: #ea6c0a; }
.zbtn:disabled { background: #c8d0e0; color: var(--sub); box-shadow: none; cursor: not-allowed; }

/* ダイアログ共通 */
.dialog-bg {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(0,0,0,.4);
  display: none; align-items: center; justify-content: center; padding: 24px;
}
.dialog-bg.show { display: flex; }
.dialog {
  background: var(--card); border-radius: 20px;
  padding: 28px 24px 20px;
  width: 100%; max-width: 320px; text-align: center;
}
.dialog-icon  { font-size: 40px; margin-bottom: 12px; }
.dialog-title { font-size: 18px; font-weight: 800; margin-bottom: 8px; }
.dialog-msg   { font-size: 14px; color: var(--sub); line-height: 1.6; margin-bottom: 20px; }
.dialog-btns  { display: flex; gap: 10px; }
.dialog-btn   { flex: 1; height: 50px; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; }
.dialog-btn.cancel { background: var(--bg); color: var(--sub); }
.dialog-btn.ok     { background: var(--red); color: #fff; }
.dialog-btn.blue   { background: var(--blue); color: #fff; }
.dialog-btn:active { opacity: .8; }
.printer-btn {
  width: 100%; height: 58px;
  border: 2px solid var(--blue); border-radius: 14px;
  background: #e8efff; color: var(--blue);
  font-size: 18px; font-weight: 800; cursor: pointer;
  transition: background .15s;
}
.printer-btn:active { background: var(--blue); color: #fff; }

/* 担当者セレクト */
.token-select {
  width: 100%; padding: 14px; font-size: 18px; font-weight: 700;
  border: 2px solid var(--border); border-radius: 12px;
  background: var(--bg); color: var(--text);
  margin-bottom: 16px; outline: none;
}

/* 未登録入力欄 */
.unreg-card {
  display: none;
  background: #fff8e8;
  border: 2px solid #f59e0b;
  border-radius: 16px;
  overflow: hidden;
  margin-bottom: 16px;
}
.unreg-card.show { display: block; }
.unreg-title {
  font-size: 12px; font-weight: 800; color: #b45309;
  text-transform: uppercase; letter-spacing: .08em;
  padding: 10px 16px; background: #fef3c7;
  border-bottom: 2px solid #f59e0b;
}
.unreg-row {
  display: flex; align-items: center;
  border-bottom: 2px solid #f59e0b; min-height: 64px;
}
.unreg-row:last-child { border-bottom: none; }
.unreg-label {
  width: 80px; flex-shrink: 0;
  font-size: 12px; font-weight: 800; color: #b45309;
  text-transform: uppercase; letter-spacing: .06em;
  text-align: center; padding: 0 8px;
  border-right: 2px solid #f59e0b;
  align-self: stretch;
  display: flex; align-items: center; justify-content: center;
  background: #fef9ee;
}
.unreg-inp {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 24px; font-weight: 800; color: var(--text);
  padding: 14px 16px; width: 100%;
}
.unreg-inp::placeholder { color: #d6b87a; font-size: 18px; font-weight: 400; }
.unreg-sel {
  flex: 1; border: none; outline: none; background: transparent;
  font-size: 20px; font-weight: 700; color: var(--text);
  padding: 14px 16px; width: 100%; cursor: pointer;
}

/* 在庫確認タブ */
.stock-card {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.stock-row {
  display: flex; align-items: center;
  border-bottom: 1px solid var(--border); min-height: 58px; padding: 0 16px; gap: 12px;
}
.stock-row:last-child { border-bottom: none; }
.stock-lbl {
  font-size: 12px; font-weight: 800; color: var(--sub);
  text-transform: uppercase; letter-spacing: .06em; width: 80px; flex-shrink: 0;
}
.stock-val { flex: 1; font-size: 20px; font-weight: 800; color: var(--text); }
.stock-val.blue { color: var(--blue); }
.stock-val.lot  { font-size: 26px; font-weight: 900; }

.qr-wrap {
  background: var(--card); border-radius: 16px;
  border: 2px solid var(--border); overflow: hidden; margin-bottom: 16px;
}
.qr-input-row {
  display: flex; align-items: center; gap: 8px; padding: 12px 14px;
  border-bottom: 2px solid var(--border);
}
.qr-input {
  flex: 1; border: 2px solid var(--border); border-radius: 10px;
  padding: 12px 14px; font-size: 18px; font-weight: 700;
  color: var(--text); outline: none; background: var(--bg);
}
.qr-input:focus { border-color: var(--blue); }
.qr-search-btn {
  padding: 12px 18px; border: none; border-radius: 10px;
  background: var(--blue); color: #fff;
  font-size: 15px; font-weight: 800; cursor: pointer;
}
.qr-video-wrap {
  width: 100%; aspect-ratio: 4/3; background: #1a1d23;
  position: relative; overflow: hidden; display: none;
}
.qr-video-wrap video { width: 100%; height: 100%; object-fit: cover; }
.qr-frame {
  position: absolute; inset: 0;
  display: flex; align-items: center; justify-content: center;
}
.qr-frame-inner {
  width: 60%; aspect-ratio: 1;
  border: 3px solid rgba(255,255,255,.8); border-radius: 16px;
  box-shadow: 0 0 0 9999px rgba(0,0,0,.4);
}
.qr-scan-btn {
  width: 100%; padding: 16px; border: none; background: var(--bg);
  font-size: 15px; font-weight: 800; color: var(--blue);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px;
  border-top: 1px solid var(--border);
}
.qr-scan-btn:active { background: #e0e8ff; }

.place-sel {
  width: 100%; padding: 14px 16px;
  font-size: 18px; font-weight: 700;
  border: 2px solid var(--border); border-radius: 16px;
  background: var(--card); color: var(--text);
  outline: none; cursor: pointer; margin-bottom: 12px;
}
.update-btn {
  width: 100%; padding: 18px; margin-bottom: 24px;
  border: none; border-radius: 16px;
  background: var(--green); color: #fff;
  font-size: 18px; font-weight: 900; cursor: pointer;
}
.update-btn:active { background: #15803d; }

/* オーバーレイ */
.ov {
  position: fixed; inset: 0; z-index: 400;
  background: rgba(238,241,247,.92);
  display: none; flex-direction: column;
  align-items: center; justify-content: center; gap: 18px;
}
.ov.show { display: flex; }
.ov-msg { font-size: 18px; font-weight: 700; color: var(--sub); }
@keyframes spin { to { transform: rotate(360deg); } }
.ring {
  width: 56px; height: 56px;
  border: 6px solid var(--border); border-top-color: var(--blue);
  border-radius: 50%; animation: spin .75s linear infinite;
}

/* トースト */
.toast {
  position: fixed; bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(10px);
  background: #111827ee; color: #fff;
  padding: 16px 28px; border-radius: 100px;
  font-size: 16px; font-weight: 700;
  white-space: pre-line; text-align: center; max-width: 86vw; line-height: 1.5;
  opacity: 0; transition: opacity .25s, transform .25s;
  pointer-events: none; z-index: 450;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.ok   { background: #16a34aee; }
.toast.err  { background: #dc2626ee; }
</style>
</head>
<body>
<div id="app">
  <div class="hd">
    <div class="hd-title">📦 製品情報入力</div>
    <div class="dot" id="dot"></div>
  </div>

  <!-- タブバー -->
  <div class="tab-bar">
    <button class="tab-btn active" onclick="switchTab(1)">✏️ 入力・印刷</button>
    <button class="tab-btn" onclick="switchTab(2)">🔍 在庫確認</button>
  </div>

  <!-- ── タブ1: 入力・印刷 ── -->
  <div class="tab-pane active" id="pane1">
    <div class="scroll">
      <div class="lbl">製品コード</div>
      <div class="prod-card">
        <div class="prod-hint">コードを入力してください</div>
        <input id="codeInput" type="text" placeholder="例: 301000"
          autocomplete="off" autocorrect="off" autocapitalize="off" spellcheck="false"
          oninput="onCode(this.value)" />
        <div class="divider"></div>
        <input id="pName" type="text" placeholder="品名" autocomplete="off" />
        <div class="prod-iri" id="pIri"></div>
      </div>

      <!-- 未登録品 -->
      <div class="unreg-card" id="unregCard">
        <div class="unreg-title">⚠️ 未登録品 — 入目とカテゴリを入力してください</div>
        <div class="unreg-row">
          <div class="unreg-label">入目</div>
          <input class="unreg-inp" id="unregIri" type="number" placeholder="例: 10" min="1" />
        </div>
        <div class="unreg-row">
          <div class="unreg-label">容器</div>
          <select class="unreg-sel" id="unregCat">
            <option value="">選択してください</option>
          </select>
        </div>
      </div>

      <div class="lbl">LOT / 枝番 / 個数</div>
      <div class="input-card">
        <div class="input-row">
          <div class="input-label">LOT</div>
          <input class="big-inp" id="lotInput" type="text" placeholder="Lot番号"
            autocomplete="off" autocorrect="off" />
        </div>
        <div class="input-row">
          <div class="input-label">枝番</div>
          <input class="big-inp" id="edabanInput" type="text" placeholder="枝番"
            autocomplete="off" autocorrect="off" />
        </div>
        <div class="input-row">
          <div class="input-label">個数</div>
          <input class="big-inp" id="kosuuInput" type="number" placeholder="0" min="0" />
        </div>
      </div>

      <div class="lbl">保管場所（任意）</div>
      <select id="placeSelect" class="place-sel">
        <option value="">選択しない</option>
      </select>
    </div>

    <div class="pbar">
      <button class="clr-btn" onclick="confirmClear()">🗑</button>
      <div class="cnt">
        <button class="cnt-btn" onclick="chg(-1)">－</button>
        <input class="cnt-val" id="cntVal" type="number" value="1" min="1" max="99"
          onchange="copies=Math.max(1,Math.min(99,parseInt(this.value)||1));this.value=copies">
        <span class="cnt-unit">部</span>
        <button class="cnt-btn" onclick="chg(1)">＋</button>
      </div>
      <button class="pbtn" id="printBtn" onclick="showPrinter()" disabled>🖨 印刷</button>
      <button class="zbtn" id="zaicoBtn" onclick="showTokenDialog()" disabled>📦 ZAICO登録</button>
    </div>
  </div>

  <!-- ── タブ2: 在庫確認 ── -->
  <div class="tab-pane" id="pane2">
    <div class="scroll">

      <div class="lbl">担当者</div>
      <select id="stockWorker" class="place-sel">
        <option value="">担当者を選択</option>
      </select>

      <div class="lbl">QRコードをスキャン</div>
      <div class="qr-wrap">
        <div class="qr-input-row">
          <input class="qr-input" id="qrInput" type="text"
            placeholder="QRコードを入力またはスキャン"
            autocomplete="off"
            onkeydown="if(event.key==='Enter') searchStock()" />
          <button class="qr-search-btn" onclick="searchStock()">検索</button>
        </div>
        <div class="qr-video-wrap" id="qrVideoWrap">
          <video id="qrVideo" playsinline autoplay muted></video>
          <div class="qr-frame"><div class="qr-frame-inner"></div></div>
        </div>
        <button class="qr-scan-btn" onclick="toggleQrScan()">📷 QRコードをスキャン</button>
      </div>

      <!-- 在庫情報 -->
      <div id="stockInfo" style="display:none;">
        <div class="lbl">在庫情報</div>
        <div class="stock-card">
          <div class="stock-row">
            <div class="stock-lbl">製品コード</div>
            <div class="stock-val blue" id="sCode"></div>
          </div>
          <div class="stock-row">
            <div class="stock-lbl">品名</div>
            <div class="stock-val" id="sName"></div>
          </div>
          <div class="stock-row">
            <div class="stock-lbl">Lot</div>
            <div class="stock-val lot" id="sLot"></div>
          </div>
          <div class="stock-row">
            <div class="stock-lbl">数量</div>
            <div class="stock-val" id="sQty"></div>
          </div>
          <div class="stock-row">
            <div class="stock-lbl">保管場所</div>
            <div class="stock-val" id="sPlace"></div>
          </div>
        </div>

        <div class="lbl">保管場所を変更</div>
        <select id="newPlaceSelect" class="place-sel">
          <option value="">選択してください</option>
        </select>
        <button class="update-btn" onclick="updatePlace()">📍 保管場所を更新する</button>

        <div class="lbl">数量を変更</div>
        <div class="input-card" style="margin-bottom:12px;">
          <div class="input-row">
            <div class="input-label">変更数</div>
            <input class="big-inp" id="newQty" type="number" placeholder="0" min="0" />
          </div>
        </div>
        <div style="display:flex;gap:10px;margin-bottom:24px;">
          <button onclick="updateQty('add')" style="
            flex:1; padding:18px; border:none; border-radius:16px;
            background:var(--green); color:#fff;
            font-size:18px; font-weight:900; cursor:pointer;">
            ➕ 入庫（足す）
          </button>
          <button onclick="updateQty('sub')" style="
            flex:1; padding:18px; border:none; border-radius:16px;
            background:var(--red); color:#fff;
            font-size:18px; font-weight:900; cursor:pointer;">
            ➖ 出庫（引く）
          </button>
        </div>
      </div>

    </div>
  </div>
</div>

<!-- プリンター選択 -->
<div class="dialog-bg" id="printerBg">
  <div class="dialog">
    <div class="dialog-icon">🖨</div>
    <div class="dialog-title">プリンターを選択</div>
    <div class="dialog-msg">印刷先を選んでください</div>
    <div style="display:flex;flex-direction:column;gap:10px;">
      <button class="printer-btn" onclick="selectPrinter('北1階')">🏭 北１階</button>
      <button class="printer-btn" onclick="selectPrinter('北2階')">🏭 北２階</button>
      <button class="printer-btn" onclick="selectPrinter('南詰所')">🏭 南詰所</button>
      <button class="printer-btn" onclick="selectPrinter('日カラ原料')">🏭 日カラ原料</button>
      <button class="dialog-btn cancel" onclick="closePrinter()" style="margin-top:4px;">キャンセル</button>
    </div>
  </div>
</div>

<!-- クリア確認 -->
<div class="dialog-bg" id="dialogBg">
  <div class="dialog">
    <div class="dialog-icon">🗑</div>
    <div class="dialog-title">クリアしますか？</div>
    <div class="dialog-msg">入力した内容がすべて消えます。</div>
    <div class="dialog-btns">
      <button class="dialog-btn cancel" onclick="closeDialog()">キャンセル</button>
      <button class="dialog-btn ok" onclick="doClear()">クリア</button>
    </div>
  </div>
</div>

<!-- 担当者選択 -->
<div class="dialog-bg" id="tokenBg">
  <div class="dialog">
    <div class="dialog-icon">👷</div>
    <div class="dialog-title">担当者を選択</div>
    <div class="dialog-msg">ZAICOに登録する担当者を選んでください</div>
    <select class="token-select" id="tokenSelect"></select>
    <div class="dialog-btns">
      <button class="dialog-btn cancel" onclick="closeTokenDialog()">キャンセル</button>
      <button class="dialog-btn blue" onclick="doZaico()">登録</button>
    </div>
  </div>
</div>

<div class="ov" id="ov">
  <div class="ring"></div>
  <div class="ov-msg" id="ovMsg">読み込み中...</div>
</div>
<div class="toast" id="toast"></div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbxFxx_u_dAALeP2MDY19NvfVxPI4F6Xdx_RplXJndEqwFg0QSIFcGVsJ1cswtwKqfoc/exec';

let master = [], tokens = [], categories = [], places = [];
let copies = 1;
let stockInventoryId = '';
let qrStream = null;
let qrScanning = false;

window.addEventListener('DOMContentLoaded', function() {
  loadMaster();
  // URLパラメータから製品コードを受け取る
  var params = new URLSearchParams(window.location.search);
  var code   = params.get('code');
  if (code) {
    document.getElementById('codeInput').value = code;
    onCode(code);
  }
});

async function loadMaster() {
  showOv('マスターデータを読み込み中...');
  try {
    var res  = await fetch(API + '?action=master');
    var json = await res.json();
    if (!json.ok) throw new Error(json.error);
    master     = json.data       || [];
    tokens     = json.tokens     || [];
    categories = json.categories || [];
    places     = json.places     || [];

    var placeEl = document.getElementById('placeSelect');
    placeEl.innerHTML = '<option value="">選択しない</option>' +
      places.map(function(p) { return '<option value="' + p + '">' + p + '</option>'; }).join('');

    var stockWorkerEl = document.getElementById('stockWorker');
    stockWorkerEl.innerHTML = '<option value="">担当者を選択</option>' +
      tokens.map(function(t) { return '<option value="' + t[1] + '">' + t[0] + '</option>'; }).join('');

    document.getElementById('dot').classList.add('ok');
    document.getElementById('printBtn').disabled = false;
    document.getElementById('zaicoBtn').disabled = false;
  } catch(e) {
    document.getElementById('dot').classList.add('err');
    toast('読み込みエラー: ' + e.message, 'err');
  }
  hideOv();
}

/* ── タブ切替 ── */
function switchTab(n) {
  document.querySelectorAll('.tab-btn').forEach(function(b, i) {
    b.classList.toggle('active', i + 1 === n);
  });
  document.querySelectorAll('.tab-pane').forEach(function(p, i) {
    p.classList.toggle('active', i + 1 === n);
  });
  if (n !== 2) stopQrScan();
}

/* ── 製品コード ── */
function onCode(v) {
  var n = document.getElementById('pName');
  var r = document.getElementById('pIri');
  var unregCard = document.getElementById('unregCard');
  var unregCat  = document.getElementById('unregCat');
  if (!v.trim()) {
    n.value = ''; n.style.color = ''; r.textContent = '';
    unregCard.classList.remove('show'); return;
  }
  var row = master.find(function(x) { return (x[0]||'').toString().trim() === v.trim(); });
  if (!row) {
    n.value = '未登録'; n.style.color = 'var(--red)'; r.textContent = '';
    unregCat.innerHTML = '<option value="">選択してください</option>' +
      categories.map(function(c) { return '<option value="' + c + '">' + c + '</option>'; }).join('');
    unregCard.classList.add('show');
  } else {
    n.value = row[1] || ''; n.style.color = 'var(--blue)';
    r.textContent = row[2] ? '入目: ' + row[2] : '';
    unregCard.classList.remove('show');
  }
}

/* ── プリンター選択 ── */
function showPrinter() {
  var code = document.getElementById('codeInput').value.trim();
  var lot  = document.getElementById('lotInput').value.trim();
  if (!code) { toast('製品コードを入力してください', 'err'); return; }
  if (!lot)  { toast('Lot番号を入力してください', 'err'); return; }
  document.getElementById('printerBg').classList.add('show');
}
function closePrinter() { document.getElementById('printerBg').classList.remove('show'); }
function selectPrinter(printer) { closePrinter(); doPrint(printer); }

/* ── クリア ── */
function confirmClear() { document.getElementById('dialogBg').classList.add('show'); }
function closeDialog()  { document.getElementById('dialogBg').classList.remove('show'); }
function doClear() {
  closeDialog();
  document.getElementById('codeInput').value   = '';
  document.getElementById('lotInput').value    = '';
  document.getElementById('edabanInput').value = '';
  document.getElementById('kosuuInput').value  = '';
  document.getElementById('pName').value       = '';
  document.getElementById('pName').style.color = '';
  document.getElementById('pIri').textContent  = '';
  document.getElementById('placeSelect').value = '';
  document.getElementById('unregCard').classList.remove('show');
  document.getElementById('unregIri').value    = '';
  document.getElementById('unregCat').value    = '';
  copies = 1;
  document.getElementById('cntVal').value = 1;
  toast('クリアしました', '');
}

/* ── 印刷 ── */
async function doPrint(printer) {
  var code   = document.getElementById('codeInput').value.trim();
  var lot    = document.getElementById('lotInput').value.trim();
  var edaban = document.getElementById('edabanInput').value.trim();
  var kosuu  = document.getElementById('kosuuInput').value.trim();
  if (!code) { toast('製品コードを入力してください', 'err'); return; }
  if (!lot)  { toast('Lot番号を入力してください', 'err'); return; }
  var mRow        = master.find(function(x) { return (x[0]||'').toString().trim() === code; });
  var productName = document.getElementById('pName').value.trim() || ((mRow && mRow[1]) ? mRow[1] : code);
  var rows        = [{lot: lot, edaban: edaban, kosuu: kosuu}];
  var payload     = {code: code, rows: rows, productName: productName, firstLot: lot, copies: copies, printer: printer};
  showOv('スプレッドシートに書き込み中...');
  try {
    var url  = API + '?action=print&d=' + encodeURIComponent(JSON.stringify(payload));
    var res  = await fetch(url);
    var json = await res.json();
    if (!json.ok) throw new Error(json.error);
    toast('✓ 保存完了\n' + json.fileName, 'ok');
  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

/* ── ZAICO登録 ── */
function showTokenDialog() {
  var code = document.getElementById('codeInput').value.trim();
  var lot  = document.getElementById('lotInput').value.trim();
  if (!code) { toast('製品コードを入力してください', 'err'); return; }
  if (!lot)  { toast('Lot番号を入力してください', 'err'); return; }
  var sel = document.getElementById('tokenSelect');
  sel.innerHTML = tokens.map(function(t) {
    return '<option value="' + t[1] + '">' + t[0] + '</option>';
  }).join('');
  if (tokens.length === 0) sel.innerHTML = '<option value="">（担当者データなし）</option>';
  document.getElementById('tokenBg').classList.add('show');
}
function closeTokenDialog() { document.getElementById('tokenBg').classList.remove('show'); }

async function doZaico() {
  var token = document.getElementById('tokenSelect').value;
  closeTokenDialog();
  if (!token) { toast('担当者を選択してください', 'err'); return; }
  var code   = document.getElementById('codeInput').value.trim();
  var lot    = document.getElementById('lotInput').value.trim();
  var name   = document.getElementById('pName').value.trim() || code;
  var mRow   = master.find(function(x) { return (x[0]||'').toString().trim() === code; });
  var iri    = mRow ? (mRow[2] || '') : document.getElementById('unregIri').value.trim();
  var cat    = mRow ? (mRow[4] || '') : document.getElementById('unregCat').value;
  var qrCode = code + '"' + lot;
  var place  = document.getElementById('placeSelect').value;
  var payload = {zaicoToken: token, code: code, name: name, lot: lot, iri: iri, cat: cat, qrCode: qrCode, place: place};
  showOv('ZAICOに登録中...');
  try {
    var url  = API + '?action=zaico&d=' + encodeURIComponent(JSON.stringify(payload));
    var res  = await fetch(url);
    var json = await res.json();
    if (!json.ok) throw new Error(json.error);
    toast('✓ ZAICO登録完了！', 'ok');
  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

/* ── 在庫確認 ── */
function toggleQrScan() {
  if (qrScanning) { stopQrScan(); } else { startQrScan(); }
}

async function startQrScan() {
  try {
    qrStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
    var video = document.getElementById('qrVideo');
    video.srcObject = qrStream;
    document.getElementById('qrVideoWrap').style.display = 'block';
    qrScanning = true;
    scanFrame(video);
  } catch(e) { toast('カメラエラー: ' + e.message, 'err'); }
}

function scanFrame(video) {
  if (!qrScanning) return;
  var canvas = document.createElement('canvas');
  var ctx    = canvas.getContext('2d');
  function tick() {
    if (!qrScanning) return;
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
      canvas.width  = video.videoWidth;
      canvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);
      var imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
      var code = jsQR(imageData.data, imageData.width, imageData.height);
      if (code) {
        document.getElementById('qrInput').value = code.data;
        stopQrScan();
        searchStock();
        return;
      }
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

function stopQrScan() {
  if (qrStream) { qrStream.getTracks().forEach(function(t) { t.stop(); }); qrStream = null; }
  document.getElementById('qrVideoWrap').style.display = 'none';
  qrScanning = false;
}

async function searchStock() {
  var qr    = document.getElementById('qrInput').value.trim();
  var token = document.getElementById('stockWorker').value;
  if (!qr)    { toast('QRコードを入力してください', 'err'); return; }
  if (!token) { toast('担当者を選択してください', 'err'); return; }
  showOv('ZAICOを検索中...');
  try {
    var url  = API + '?action=zaicoSearch&qr=' + encodeURIComponent(qr) + '&token=' + encodeURIComponent(token);
    var res  = await fetch(url);
    var json = await res.json();
    if (!json.ok) throw new Error(json.error);
    var r = json.result;
    stockInventoryId = r.id || '';

    var lotAttr = (r.optional_attributes || []).find(function(a) { return a.name === 'Lot'; });
    document.getElementById('sCode').textContent  = r.code  || '';
    document.getElementById('sName').textContent  = r.title || '';
    document.getElementById('sLot').textContent   = lotAttr ? lotAttr.value : '';
    document.getElementById('sQty').textContent   = (r.quantity || 0) + ' 個';
    document.getElementById('newQty').value = '';
    document.getElementById('sPlace').textContent = r.place || '（未設定）';
    document.getElementById('newQty').value = r.quantity || 0;

    var sel = document.getElementById('newPlaceSelect');
    sel.innerHTML = '<option value="">選択してください</option>' +
      places.map(function(p) {
        return '<option value="' + p + '"' + (p === r.place ? ' selected' : '') + '>' + p + '</option>';
      }).join('');

    document.getElementById('stockInfo').style.display = 'block';
  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

async function updatePlace() {
  var token    = document.getElementById('stockWorker').value;
  var newPlace = document.getElementById('newPlaceSelect').value;
  if (!token)    { toast('担当者を選択してください', 'err'); return; }
  if (!newPlace) { toast('保管場所を選択してください', 'err'); return; }
  if (!stockInventoryId) { toast('在庫IDが不明です', 'err'); return; }
  showOv('保管場所を更新中...');
  try {
    var payload = { zaicoToken: token, inventoryId: stockInventoryId, place: newPlace };
    var url     = API + '?action=zaicoUpdate&d=' + encodeURIComponent(JSON.stringify(payload));
    var res     = await fetch(url);
    var json    = await res.json();
    if (!json.ok) throw new Error(json.error);
    document.getElementById('sPlace').textContent = newPlace;
    toast('✓ 保管場所を更新しました！', 'ok');
  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

async function updateQty(type) {
  var token  = document.getElementById('stockWorker').value;
  var chg    = parseFloat(document.getElementById('newQty').value);
  if (!token)            { toast('担当者を選択してください', 'err'); return; }
  if (isNaN(chg) || chg <= 0) { toast('変更数を入力してください', 'err'); return; }
  if (!stockInventoryId) { toast('在庫IDが不明です', 'err'); return; }

  // 現在の数量から計算
  var currentQty = parseFloat(document.getElementById('sQty').textContent.replace(' 個','')) || 0;
  var newQty     = type === 'add' ? currentQty + chg : currentQty - chg;
  if (newQty < 0) { toast('数量がマイナスになります', 'err'); return; }

  showOv('数量を更新中...');
  try {
    var payload = { zaicoToken: token, inventoryId: stockInventoryId, quantity: newQty };
    var url     = API + '?action=zaicoUpdateQty&d=' + encodeURIComponent(JSON.stringify(payload));
    var res     = await fetch(url);
    var json    = await res.json();
    if (!json.ok) throw new Error(json.error);
    document.getElementById('sQty').textContent = newQty + ' 個';
    document.getElementById('newQty').value = '';
    toast('✓ ' + (type === 'add' ? '入庫' : '出庫') + ' ' + chg + '個 → 残数: ' + newQty + '個', 'ok');
  } catch(e) {
    toast('エラー: ' + e.message, 'err');
  }
  hideOv();
}

/* ── ヘルパー ── */
function chg(d) { copies = Math.max(1, Math.min(99, copies + d)); document.getElementById('cntVal').value = copies; }
function showOv(m) { document.getElementById('ovMsg').textContent = m; document.getElementById('ov').classList.add('show'); }
function hideOv()  { document.getElementById('ov').classList.remove('show'); }
function toast(msg, type) {
  var el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(el._t);
  el._t = setTimeout(function() { el.className = 'toast'; }, 3500);
}
</script>
</body>
</html>
